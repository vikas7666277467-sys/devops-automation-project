# JENKINS_HOST must contain the Jenkins private IP when run from the Ansible
# controller (recommended), or its public IP when run from a trusted workstation.
# Use ssh-agent for the existing EC2 key; private keys are never stored here.
[jenkins]
jenkins-server ansible_host="{{ lookup('env', 'JENKINS_HOST') }}"

[jenkins:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
